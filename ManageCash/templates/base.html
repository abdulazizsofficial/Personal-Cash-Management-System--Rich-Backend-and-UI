<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManageCash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: #172033;
      --line: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --cash: #22c55e;
      --expense: #f97316;
      --brand: #38bdf8;
      --brand-2: #8b5cf6;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(2, 6, 23, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 32rem),
        linear-gradient(135deg, #08111f 0%, #111827 48%, #162033 100%);
      color: var(--text);
    }

    a {
      color: inherit;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .page-heading {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin: 28px 0 20px;
    }

    .page-heading h1,
    .page-heading h2 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      letter-spacing: 0;
    }

    .page-heading p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      background: rgba(17, 24, 39, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .btn,
    .button,
    input[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:hover,
    .button:hover,
    input[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(56, 189, 248, 0.2);
    }

    .btn-secondary {
      background: rgba(148, 163, 184, 0.12);
      color: #dbeafe;
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.14);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.28);
    }

    .table-wrap {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    .data-table th,
    .data-table td {
      padding: 15px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    .data-table th {
      color: #cbd5e1;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(15, 23, 42, 0.62);
    }

    .data-table td {
      color: #e2e8f0;
      font-size: 0.92rem;
    }

    .data-table tr:hover td {
      background: rgba(56, 189, 248, 0.06);
    }

    .amount-cash {
      color: #86efac;
      font-weight: 800;
    }

    .amount-expense {
      color: #fdba74;
      font-weight: 800;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .empty-state {
      padding: 36px 16px;
      text-align: center;
      color: var(--muted);
    }

    .form-page {
      max-width: 760px;
      margin: 28px auto 0;
    }

    .form-panel {
      padding: 26px;
    }

    form p {
      margin: 0 0 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 700;
      font-size: 0.9rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      padding: 12px 13px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(56, 189, 248, 0.72);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
    }

    .helptext,
    form ul {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .errorlist {
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      list-style-position: inside;
    }

    @media (max-width: 720px) {
      .app-shell {
        width: min(100% - 24px, 1180px);
        padding-top: 14px;
      }

      .page-heading {
        display: block;
      }
    }
  </style>
</head>
<body>
  {% include 'nav.html' %}
  <main class="app-shell">
    {% block body %}
    {% endblock body %}
  </main>
</body>
</html>
